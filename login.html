<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Login - TecBlog</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex vh-100 align-items-center justify-content-center">

  <div class="card p-4" style="width:350px;">
    <h3 class="text-center mb-3">Login</h3>

    <form>
      <input type="text" class="form-control mb-3" placeholder="Usuário">
      <input type="password" class="form-control mb-3" placeholder="Senha">
      <button class="btn btn-warning w-100">Entrar</button>
    </form>

    <p class="text-center mt-3">
      Não tem conta? <a href="cadastro.html">Cadastre-se</a>
    </p>

  </div>

</div>

</body>
</html>
